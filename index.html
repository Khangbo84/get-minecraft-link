<!DOCTYPE html>
<html lang="vi">
  <head>
    <title>Get minecraft link</title>
  </head>
  <style>
  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1e1b4b,#312e81,#4f46e5);
    min-height:100vh;
    justify-content:center;
    align-items:center;
}

    h1 { text-align: center; font-size: 26px; margin-bottom: 6px; font-weight: 700; color:white}
    
.container{
    width:90%;
    max-width:650px;
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:15px;
    font-size:16px;
}

button { background: linear-gradient(90deg, #42a5f5, #5c6bc0); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 12px; transition: transform 0.18s, box-shadow 0.18s; font-weight: 700; }

button:hover{
    background:#1d4ed8;
}
    p{
      color: white;
      text-align: center;
      font-size:20px;
    }
  </style>
  <body>
    <h1>Lấy link download Minecraft nhanh chóng!</h1>
<input id="url">

<button onclick="getLink()">
Lấy link
</button>
<div id="container">
<p>result here:</p>
  <br>
  <p id="result"></p>
  <button onclick="cpLink()">copy</button>
</div>
  </body>
<script>
async function getLink(){

    const url=document.getElementById("url").value;

    const res=await fetch(
        "https://mcpedl.khangbo84contact.workers.dev/?url="
        +encodeURIComponent(url)
    );

    const json=await res.json();

    document.getElementById("result").innerHTML=
    `<a href="${json.download}">
        ${json.download}
    </a>`;
}
  async function cpLink(){
    const text = document.getElementById("result").textContent;

    try {
        await navigator.clipboard.writeText(text);
        alert("Đã sao chép!");
    } catch (err) {
        alert("Không thể sao chép.");
    }
  
  }
    
</script>
