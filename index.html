<!DOCTYPE html>
<html lang="vi">
  <head>
    <title>Get minecraft link</title>
  </head>
  <style>
  body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1e1b4b,#312e81,#4f46e5);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.container{

    width:90%;
    max-width:420px;

    background:white;

    padding:25px;

    border-radius:18px;

    box-shadow:0 12px 30px rgba(0,0,0,.3);

}

h1{

    color:#222;

    text-align:center;

    margin-top:0;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:12px;

    font-size:16px;

    border-radius:10px;

    border:1px solid #bbb;

}

button{

    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#4f46e5;

    color:white;

    font-size:16px;

    font-weight:bold;

}

#container{

    display:none;

    margin-top:20px;

}

#result{

    background:#f5f5f5;

    border-radius:10px;

    padding:12px;

    word-break:break-all;

}

.btn-group{

    display:flex;

    gap:10px;

}

.btn-group button{

    flex:1;

  }
p{
  font-size:20px;
}
.version{
  opacity:0.6;
  color: white;
  font-size:13px;
}
  .vi{
    
    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:10px;

    background: linear-gradient(90deg, #ff0000, #ff9900, #ffd700, #ff0000, #ff9900); 

    color:white;

    font-size:20px;

    font-weight:bold;
  }
    .en{
      
    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:10px;

    background: linear-gradient(90deg, #42a5f5, #5c6bc0);

    color:white;

    font-size:20px;

    font-weight:bold;
    }
  </style>
  <body>
    <div class="container">
      <h1>Choose your language</h1>
      <div class="lang">
      <button class="vi" onclick="viLang()">Vietnamese</button>
      <button class="en" onclick="enLang()">English</button>
      </div>
    </div>
    <div class="container">
      <h1>How to use</h1>
      <h3>English</h3>
      <p>1.Copy URL in website</p>
      <p>2.Paste the link below.</p>
      <p>3.Click "Get link"</p>
      <p>4.Copy the link and paste it into your browser's search bar.</p>
    </div>
      <div class="container">

    <h1>📥 MCPEDL Direct Link</h1>

    <input
        id="url"
        placeholder="https://mcpedl.org/getfile/7255">

    <button onclick="getLink()">Get Link</button>

    <div id="container">

        <h3>Result</h3>

        <div id="result"></div>

        <div class="btn-group">
            <button onclick="cpLink()">Copy</button>

            <a id="download" target="_blank">
                <button>⬇ Download</button>
            </a>
        </div>

    </div>

    </div>
    <div class="container">
    <h1>Credit</h1>
      <p>Khangbo84</p>
    <div class="version">
      <p>version 1.0.0</p>
    </div>
    </div>
  </body>
<script>
async function getLink(){

    const url=document.getElementById("url").value;

    const res=await fetch(
        "https://mcpedl.khangbo84contact.workers.dev/?url="
        +encodeURIComponent(url)
    );

    const json=await res.json();
document.getElementById("container").style.display="block";

document.getElementById("result").textContent=json.download;

document.getElementById("download").href=json.download;
};
  async function cpLink(){
    const text=document.getElementById("result").textContent.trim();
    try {
        await navigator.clipboard.writeText(text);
        alert("Đã sao chép!");
    } catch (err) {
        alert("Không thể sao chép.");
    }
  
  }
    
</script>
</html>
